name: Package

on:
  workflow_call:
    inputs:
      package_name:
        description: Command/binary name used for validation.
        type: string
        required: true
      dotnet_version:
        description: .NET version to install.
        type: string
        required: true
      dotnet_project_path:
        description: Path to the .NET project file.
        type: string
        required: true
      package_smoke_script:
        description: Smoke script to validate the published binary.
        type: string
        required: true
      package_metadata_finalize_script:
        description: Script that finalizes caller-specific package metadata.
        type: string
        required: true
      package_publish_matrix:
        description: JSON array describing publish matrix entries.
        type: string
        required: true
      jreleaser_image:
        description: JReleaser container image.
        type: string
        required: true
      jreleaser_config:
        description: Path to JReleaser config file.
        type: string
        required: true
      nix_package_name:
        description: Nix package attribute name used in version validation.
        type: string
        required: true
    outputs:
      version:
        description: Release version without the v prefix.
        value: ${{ jobs.version.outputs.version }}
      revision:
        description: Source revision used for the package.
        value: ${{ jobs.version.outputs.revision }}

permissions:
  contents: read
  attestations: write
  id-token: write

jobs:
  version:
    name: Validate and compare the release version
    runs-on: ubuntu-26.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      revision: ${{ steps.version.outputs.revision }}
    env:
      JRELEASER_IMAGE: ${{ inputs.jreleaser_image }}
    steps:
      - name: Check out the release commit
        uses: actions/checkout@v7
      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ inputs.dotnet_version }}
      - name: Install pinned Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: experimental-features = nix-command flakes
      - name: Derive one strict X.Y.Z version
        id: version
        run: |
          tag="$GITHUB_REF_NAME"
          if [[ ! "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Tag is not strict vX.Y.Z: $tag" >&2
            exit 1
          fi
          version="${tag#v}"
          test "v$version" = "$tag"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "revision=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
      - name: Compare .NET CLI output
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: |
          dotnet publish "${{ inputs.dotnet_project_path }}" \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained false \
            --output artifacts/version-check \
            -p:Version="$VERSION" \
            -p:SourceRevisionId="$GITHUB_SHA"
          test "$("artifacts/version-check/$PACKAGE_NAME" version)" = "$PACKAGE_NAME $VERSION"
      - name: Compare Nix package version
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
          NIX_PACKAGE_NAME: ${{ inputs.nix_package_name }}
        run: |
          nix_attr=".#packages.x86_64-linux.${NIX_PACKAGE_NAME}.version"
          test "$(nix eval --impure --raw "$nix_attr")" = "$VERSION"
      - name: Compare JReleaser project version
        env:
          VERSION: ${{ steps.version.outputs.version }}
          JRELEASER_PROJECT_VERSION: ${{ steps.version.outputs.version }}
          JRELEASER_CONFIG: ${{ inputs.jreleaser_config }}
          JRELEASER_GITHUB_TOKEN: validation-only
        run: |
          docker run --rm --user "$(id -u):$(id -g)" \
            -v "$PWD:/workspace" \
            -e JRELEASER_PROJECT_VERSION \
            -e JRELEASER_GITHUB_TOKEN \
            "$JRELEASER_IMAGE" \
            config --strict --full --reproducible \
            --basedir /workspace \
            --config-file "$JRELEASER_CONFIG"
          test "$(sed -n 's/^projectVersion=//p' out/jreleaser/output.properties)" = "$VERSION"

  native-publish:
    name: Publish ${{ matrix.rid }} directory
    needs: version
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.package_publish_matrix) }}
    steps:
      - name: Check out the release commit
        uses: actions/checkout@v7
      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ inputs.dotnet_version }}
      - name: Confirm the native runner architecture
        shell: pwsh
        run: >-
          python -c "import platform, sys; actual = platform.machine().lower(); expected = '${{ matrix.machine }}'; print(f'runner architecture: {actual}'); sys.exit(0 if actual == expected else 1)"
      - name: Publish the self-contained untrimmed directory
        shell: pwsh
        run: >-
          dotnet publish "${{ inputs.dotnet_project_path }}"
          --configuration Release
          --runtime "${{ matrix.rid }}"
          --self-contained true
          --output "artifacts/publish/${{ matrix.rid }}"
          -p:Version="${{ needs.version.outputs.version }}"
          -p:SourceRevisionId="${{ needs.version.outputs.revision }}"
          -p:DebugSymbols=false
          -p:DebugType=None
          -p:PublishTrimmed=false
          -p:PublishSingleFile=false
      - name: Smoke version, help, and offline serve
        shell: pwsh
        run: >-
          python "${{ inputs.package_smoke_script }}"
          "${{ matrix.executable }}"
          --version "${{ needs.version.outputs.version }}"
      - name: Upload the RID publish directory
        uses: actions/upload-artifact@v7
        with:
          name: publish-${{ matrix.rid }}
          path: artifacts/publish
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  release-assets:
    name: Assemble release assets
    needs:
      - version
      - native-publish
    runs-on: ubuntu-26.04
    permissions:
      contents: read
      attestations: write
      id-token: write
    env:
      JRELEASER_IMAGE: ${{ inputs.jreleaser_image }}
      JRELEASER_PROJECT_VERSION: ${{ needs.version.outputs.version }}
      JRELEASER_GITHUB_TOKEN: validation-only
      JRELEASER_CONFIG: ${{ inputs.jreleaser_config }}
    steps:
      - name: Check out release packaging
        uses: actions/checkout@v7
      - name: Download all publish directories
        uses: actions/download-artifact@v8
        with:
          pattern: publish-*
          path: artifacts/publish
          merge-multiple: true
      - name: Restore Unix command executable modes
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: |
          chmod +x \
            "artifacts/publish/linux-x64/$PACKAGE_NAME" \
            "artifacts/publish/linux-arm64/$PACKAGE_NAME" \
            "artifacts/publish/osx-arm64/$PACKAGE_NAME"
      - name: Assemble archives and package metadata
        run: |
          for phase in assemble checksum prepare; do
            docker run --rm --user "$(id -u):$(id -g)" \
              -v "$PWD:/workspace" \
              -e JRELEASER_PROJECT_VERSION \
              -e JRELEASER_GITHUB_TOKEN \
              "$JRELEASER_IMAGE" \
              "$phase" --strict --reproducible \
              --basedir /workspace \
              --config-file "$JRELEASER_CONFIG"
          done
      - name: Collect release assets and finalize package metadata
        run: |
          mkdir -p artifacts/release artifacts/package-metadata
          find out/jreleaser/assemble -maxdepth 4 -type f \
            \( -name '*.tar.gz' -o -name '*.zip' \) \
            -exec cp {} artifacts/release/ \;
          cp out/jreleaser/checksums/checksums_sha256.txt artifacts/release/
          "${{ inputs.package_metadata_finalize_script }}" \
            --version "${{ needs.version.outputs.version }}" \
            --release-directory artifacts/release \
            --metadata-directory out/jreleaser/prepare
          cp -R out/jreleaser/prepare/. artifacts/package-metadata/
      - name: Verify five platform release archives
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          PACKAGE_PUBLISH_MATRIX: ${{ inputs.package_publish_matrix }}
        run: |
          verification_root="$(mktemp -d)"
          trap 'rm -rf "$verification_root"' EXIT

          python3 - "artifacts/release" "$PACKAGE_PUBLISH_MATRIX" <<'PY'
          import json
          import sys
          from pathlib import Path

          release_directory = Path(sys.argv[1])
          matrix = json.loads(sys.argv[2])
          expected_formats = {
              "linux-x64": "tar.gz",
              "linux-arm64": "tar.gz",
              "osx-arm64": "zip",
              "win-x64": "zip",
              "win-arm64": "zip",
          }
          rids = [entry.get("rid") for entry in matrix]
          if set(rids) != set(expected_formats) or len(rids) != len(expected_formats):
              raise SystemExit(
                  "package_publish_matrix must contain exactly the five supported release RIDs: "
                  + ", ".join(expected_formats)
              )

          archives = sorted(
              path for path in release_directory.iterdir()
              if path.is_file() and (path.name.endswith(".tar.gz") or path.suffix == ".zip")
          )
          if len(archives) != len(expected_formats):
              raise SystemExit(f"expected {len(expected_formats)} release archives, found {len(archives)}")

          for rid, extension in expected_formats.items():
              matches = list(release_directory.glob(f"*-{rid}.{extension}"))
              if len(matches) != 1:
                  raise SystemExit(f"expected one {rid}.{extension} archive, found {len(matches)}")
          PY

          verify_archive() {
            local rid="$1"
            local format="$2"
            local executable_name="$3"
            local extract_dir="$verification_root/$rid"
            local -a archives=()
            local -a executables=()

            mapfile -t archives < <(
              find artifacts/release -maxdepth 1 -type f -name "*-${rid}.${format}" -print
            )
            if [ "${#archives[@]}" -ne 1 ]; then
              echo "::error::Expected one ${rid} archive, found ${#archives[@]}." >&2
              return 1
            fi

            mkdir -p "$extract_dir"
            if [ "$format" = "tar.gz" ]; then
              tar -xzf "${archives[0]}" -C "$extract_dir"
            else
              unzip -q "${archives[0]}" -d "$extract_dir"
            fi

            mapfile -t executables < <(
              find "$extract_dir" -type f -path "*/bin/$executable_name" -print
            )
            if [ "${#executables[@]}" -ne 1 ]; then
              echo "::error::Expected one bin/$executable_name in ${archives[0]}, found ${#executables[@]}." >&2
              return 1
            fi
            if [ "$format" != zip ] && [ ! -x "${executables[0]}" ]; then
              echo "::error::${executables[0]} is not executable in ${archives[0]}." >&2
              return 1
            fi
          }

          verify_archive linux-x64 tar.gz "$PACKAGE_NAME"
          verify_archive linux-arm64 tar.gz "$PACKAGE_NAME"
          verify_archive osx-arm64 zip "$PACKAGE_NAME"
          verify_archive win-x64 zip "$PACKAGE_NAME.exe"
          verify_archive win-arm64 zip "$PACKAGE_NAME.exe"
      - name: Generate release asset provenance
        uses: actions/attest@v4
        with:
          subject-checksums: artifacts/release/checksums_sha256.txt
      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ needs.version.outputs.version }}
          path: artifacts/release
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
      - name: Upload package metadata
        uses: actions/upload-artifact@v7
        with:
          name: package-metadata-${{ needs.version.outputs.version }}
          path: artifacts/package-metadata
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
      - name: Upload the JReleaser workspace
        uses: actions/upload-artifact@v7
        with:
          name: jreleaser-workspace-${{ needs.version.outputs.version }}
          path: out/jreleaser
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
