name: Validate package

on:
  workflow_call:
    inputs:
      version:
        description: Release version without the v prefix.
        required: true
        type: string

permissions:
  contents: read

jobs:
  package:
    name: Validate release archives
    runs-on: ubuntu-26.04
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          name: release-assets-${{ inputs.version }}
          path: artifacts/release
      - name: Check release checksums
        run: |
          cd artifacts/release
          sha256sum --check checksums_sha256.txt
