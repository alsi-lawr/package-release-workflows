name: Test release package lifecycles

on:
  workflow_call:
    inputs:
      version:
        description: Release version (without v prefix).
        type: string
        required: true
      command_name:
        description: Installed executable to validate.
        type: string
        required: true
      state_directory_name:
        description: Per-user marker directory name used by smoke tests.
        type: string
        required: true
      smoke_script:
        description: Smoke test script path.
        type: string
        required: true
      brew_formula_path:
        description: Full path to the Homebrew formula artifact.
        type: string
        required: true
      scoop_manifest_path:
        description: Full path to Scoop manifest artifact.
        type: string
        required: true
      chocolatey_nuspec_path:
        description: Full path to Chocolatey nuspec.
        type: string
        required: true
      winget_manifest_prefix:
        description: Prefix for WinGet manifests under artifacts package metadata.
        type: string
        required: true
      winget_identifier:
        description: WinGet package identifier.
        type: string
        required: true
      run_homebrew_test:
        description: Enable the Homebrew lifecycle test.
        type: boolean
        required: true
      run_windows_packaging_tests:
        description: Enable Scoop and Chocolatey lifecycle tests.
        type: boolean
        required: true
      run_winget_test:
        description: Enable WinGet manifest validation and lifecycle test.
        type: boolean
        required: true

permissions:
  contents: read

jobs:
  package-homebrew-test:
    if: ${{ inputs.run_homebrew_test }}
    name: Test the Homebrew lifecycle
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Check out smoke tooling
        uses: actions/checkout@v7
      - name: Check out shared release workflow helpers
        uses: actions/checkout@v7
        with:
          repository: alsi-lawr/package-release-workflows
          ref: main
          path: .shared-release-workflows
          persist-credentials: false
      - name: Download JReleaser package metadata
        uses: actions/download-artifact@v8
        with:
          name: package-metadata-${{ inputs.version }}
          path: artifacts/package-metadata
      - name: Install, smoke, reinstall, and uninstall the formula
        env:
          VERSION: ${{ inputs.version }}
          FORMULA_PATH: ${{ inputs.brew_formula_path }}
          SMOKE_SCRIPT: ${{ inputs.smoke_script }}
          COMMAND_NAME: ${{ inputs.command_name }}
          STATE_DIR_NAME: ${{ inputs.state_directory_name }}
        run: |
          "$GITHUB_WORKSPACE/.shared-release-workflows/.github/workflows/scripts/test-homebrew-package.sh"

  package-windows-tests:
    if: ${{ inputs.run_windows_packaging_tests }}
    name: Test Scoop and Chocolatey lifecycles
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Check out smoke tooling
        uses: actions/checkout@v7
      - name: Check out shared release workflow helpers
        uses: actions/checkout@v7
        with:
          repository: alsi-lawr/package-release-workflows
          ref: main
          path: .shared-release-workflows
          persist-credentials: false
      - name: Download JReleaser package metadata
        uses: actions/download-artifact@v8
        with:
          name: package-metadata-${{ inputs.version }}
          path: artifacts/package-metadata
      - name: Test Scoop and Chocolatey package lifecycles
        shell: pwsh
        env:
          VERSION: ${{ inputs.version }}
          COMMAND_NAME: ${{ inputs.command_name }}
          STATE_DIR_NAME: ${{ inputs.state_directory_name }}
          SCOOP_MANIFEST: ${{ inputs.scoop_manifest_path }}
          CHOCOLATEY_NUSPEC: ${{ inputs.chocolatey_nuspec_path }}
        run: |
          & "$env:GITHUB_WORKSPACE/.shared-release-workflows/.github/workflows/scripts/test-windows-packages.ps1"

  package-winget-test:
    if: ${{ inputs.run_winget_test }}
    name: Test the WinGet lifecycle on a Windows client
    runs-on: windows-11-arm
    permissions:
      contents: read
    steps:
      - name: Check out smoke tooling
        uses: actions/checkout@v7
      - name: Check out shared release workflow helpers
        uses: actions/checkout@v7
        with:
          repository: alsi-lawr/package-release-workflows
          ref: main
          path: .shared-release-workflows
          persist-credentials: false
      - name: Download JReleaser package metadata
        uses: actions/download-artifact@v8
        with:
          name: package-metadata-${{ inputs.version }}
          path: artifacts/package-metadata
      - name: Provision WinGet and test its package lifecycle
        shell: pwsh
        env:
          VERSION: ${{ inputs.version }}
          COMMAND_NAME: ${{ inputs.command_name }}
          STATE_DIR_NAME: ${{ inputs.state_directory_name }}
          WINGET_MANIFEST_PREFIX: ${{ inputs.winget_manifest_prefix }}
          WINGET_IDENTIFIER: ${{ inputs.winget_identifier }}
        run: |
          & "$env:GITHUB_WORKSPACE/.shared-release-workflows/.github/workflows/scripts/test-winget-package.ps1"
